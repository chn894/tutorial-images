# Claude Forge — Caller Workflow
# Copy this file to your repo's .github/workflows/claude.yml
#
# Required secrets: CLAUDE_CODE_OAUTH_TOKEN, APP_PRIVATE_KEY
# Required variables: APP_ID
#
# Optional secrets:
#   VIMEO_ACCESS_TOKEN — If set, Job 2 E2E failure videos and Job 3 AI visual
#                        acceptance videos are uploaded to Vimeo (unlisted)
#                        and linked inline in issue/PR comments. Without it,
#                        videos remain in GitHub artifacts only (login required).
#                        Token scope: upload + edit. Quota applies per Vimeo plan.
#
# Customize inputs per job to override defaults:
#   with:
#     language: 'english'
#     model: 'claude-sonnet-4-6'

name: Claude Forge

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  # PR inline comments — 用戶可在 PR diff 上留言 `@claude` 觸發 fix
  pull_request_review_comment:
    types: [created]
  # PR review body (整體 review 而非 inline)
  pull_request_review:
    types: [submitted]
  # 註：pull_request（opened/synchronize）觸發不掛，避免推 code 即觸發

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  # ── Issue Expansion ─────────────────────────────────
  # Security: bot filter + author_association whitelist.
  # Ensures only repo owner / org member / invited collaborator can trigger.
  # Critical if this caller lives in a public repo.
  issue-expand:
    if: >
      github.event_name == 'issues' &&
      github.event.sender.type != 'Bot' &&
      contains(github.event.issue.body, '@claude') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.issue.author_association)
    uses: chn894/claude-forge/.github/workflows/issue-expand.yml@master
    secrets: inherit

  # ── Agent Pipeline (implement + test + PR) ──────────
  # Same security model as issue-expand.
  agent-pipeline:
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.type != 'Bot' &&
       contains(github.event.review.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                github.event.review.author_association))
    uses: chn894/claude-forge/.github/workflows/agent-pipeline.yml@master
    secrets: inherit

  # ── Standalone PR Review/Fix REMOVED ─────────────────
  # Review 與 Fix 邏輯已整合進 agent-pipeline.yml 的 Stage 3g~3m
  # （session-driven sub-agent 協作，學自 j7 架構）
  # 移除原因：
  #   1. 兩 reviewer 邏輯不同步問題（standalone 不認 Phase 拆分）
  #   2. claude-fix 在 PR push 時誤觸發 → 撞 CDN install 429
  #   3. 每 rerun 多 5-7 則 bot comment → 撞 ARG_MAX
  # 若需 fix 已合併 PR 上的問題，留言 `@claude 開工` 重觸發 pipeline。
